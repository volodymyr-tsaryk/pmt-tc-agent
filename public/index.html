<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Analyzer Agent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 20px;
      background: #1a1d27;
      border-bottom: 1px solid #2d3748;
      flex-shrink: 0;
    }

    header h1 { font-size: 16px; font-weight: 600; color: #f8fafc; }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: #68d391;
      margin-left: auto;
    }

    .live-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #68d391;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .layout {
      display: grid;
      grid-template-columns: 240px 1fr;
      flex: 1;
      overflow: hidden;
    }

    .sidebar {
      background: #1a1d27;
      border-right: 1px solid #2d3748;
      padding: 16px 12px;
      overflow-y: auto;
    }

    .sidebar-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: #718096;
      text-transform: uppercase;
      margin-bottom: 12px;
      padding: 0 4px;
    }

    .agent-card {
      background: #242736;
      border: 1px solid #2d3748;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
    }

    .agent-card:last-child { margin-bottom: 0; }

    .agent-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .status-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-idle                { background: #4a5568; }
    .dot-processing          { background: #ecc94b; animation: pulse 1s infinite; }
    .dot-plan_written        { background: #68d391; }
    .dot-needs_clarification { background: #ed8936; }
    .dot-error               { background: #fc8181; }

    .agent-name { font-size: 13px; font-weight: 600; color: #f8fafc; }

    .agent-meta { font-size: 11px; color: #718096; line-height: 1.8; }

    .status-label {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .label-idle                { background: #2d3748; color: #718096; }
    .label-processing          { background: #744210; color: #ecc94b; }
    .label-plan_written        { background: #1c4532; color: #68d391; }
    .label-needs_clarification { background: #7b341e; color: #ed8936; }
    .label-error               { background: #742a2a; color: #fc8181; }

    .log-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .log-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid #2d3748;
      flex-shrink: 0;
    }

    .log-header-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: #718096;
      text-transform: uppercase;
    }

    .log-feed {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 12px;
    }

    .log-feed::-webkit-scrollbar { width: 4px; }
    .log-feed::-webkit-scrollbar-track { background: transparent; }
    .log-feed::-webkit-scrollbar-thumb { background: #2d3748; border-radius: 2px; }

    .log-entry {
      display: grid;
      grid-template-columns: 80px 80px 1fr;
      gap: 8px;
      padding: 3px 16px;
      line-height: 1.6;
      border-left: 2px solid transparent;
    }

    .log-entry:hover { background: #1a1d27; }
    .log-entry.level-warn  { border-left-color: #ed8936; }
    .log-entry.level-error { border-left-color: #fc8181; }

    .log-time    { color: #4a5568; }
    .log-source  { color: #9f7aea; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .log-message { color: #cbd5e0; word-break: break-word; }
    .log-taskid  { color: #63b3ed; font-weight: 600; margin-right: 4px; }

    .log-entry.level-warn  .log-message { color: #ecc94b; }
    .log-entry.level-error .log-message { color: #fc8181; }

    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #4a5568;
      font-size: 13px;
    }

    .view-history-link {
      display: inline-block;
      margin-top: 8px;
      font-size: 10px;
      color: #63b3ed;
      cursor: pointer;
      user-select: none;
    }

    .view-history-link:hover { text-decoration: underline; }

    .run-list { display: flex; flex-direction: column; gap: 12px; }

    .run-section {
      border: 1px solid #2d3748;
      border-radius: 6px;
      overflow: hidden;
    }

    .run-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: #242736;
      cursor: pointer;
      user-select: none;
      font-size: 11px;
    }

    .run-header:hover { background: #2d3244; }

    .run-latest-badge {
      font-size: 9px;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 3px;
      background: #2b4c7e;
      color: #63b3ed;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .run-task-id { color: #63b3ed; font-weight: 600; }

    .run-time { color: #4a5568; margin-left: auto; }

    .run-body {
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 11px;
    }

    .run-body.collapsed { display: none; }

    .step-user {
      background: #1a202c;
      border-left: 3px solid #4a5568;
      padding: 6px 10px;
      color: #a0aec0;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.5;
    }

    .step-label {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 3px;
    }

    .step-tool-call {
      background: #2d2000;
      border-left: 3px solid #ecc94b;
      padding: 6px 10px;
      color: #ecc94b;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.5;
    }

    .step-tool-result {
      background: #1a1d27;
      border-left: 3px solid #4a5568;
      padding: 6px 10px;
      color: #718096;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.5;
    }

    .step-assistant {
      background: #0d2137;
      border-left: 3px solid #4299e1;
      padding: 6px 10px;
      color: #90cdf4;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.5;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: #1a1d27;
      border: 1px solid #2d3748;
      border-radius: 10px;
      width: min(640px, 90vw);
      max-height: 80vh;
      display: flex;
      flex-direction: column;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid #2d3748;
      flex-shrink: 0;
    }

    .modal-title { font-size: 13px; font-weight: 600; color: #f8fafc; }

    .modal-close {
      font-size: 18px;
      color: #718096;
      cursor: pointer;
      line-height: 1;
      user-select: none;
    }

    .modal-close:hover { color: #f8fafc; }

    .modal-body {
      overflow-y: auto;
      padding: 16px;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 12px;
      color: #cbd5e0;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <header>
    <h1>Task Analyzer Agent</h1>
    <div class="live-badge">
      <div class="live-dot"></div>
      <span>live</span>
    </div>
  </header>

  <div class="modal-overlay" id="prompt-modal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modal-title">Run History</span>
        <span class="modal-close" id="modal-close">✕</span>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-label">Agents</div>
      <div id="agents-container"></div>
    </aside>

    <section class="log-panel">
      <div class="log-header">
        <span class="log-header-label">Log Feed</span>
        <span id="log-count" style="font-size:11px;color:#4a5568;">— events</span>
      </div>
      <div class="log-feed" id="log-feed">
        <div class="empty-state">Waiting for events…</div>
      </div>
    </section>
  </div>

  <script>
    // Escape HTML to prevent XSS — used only for CSS class name suffixes
    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    const POLL_INTERVAL = 3000;
    let lastLogId = 0;
    let autoScroll = true;

    const promptModal = document.getElementById('prompt-modal');
    const modalBody = document.getElementById('modal-body');

    function openHistoryModal(agent) {
      document.getElementById('modal-title').textContent =
        (agent.adapter || agent.name) + ' — Run History';
      modalBody.textContent = '';

      const runs = (agent.runs || []).slice().reverse(); // newest first

      if (!runs.length) {
        const empty = document.createElement('div');
        empty.style.cssText = 'color:#4a5568;font-size:13px;padding:16px;text-align:center;';
        empty.textContent = 'No runs yet.';
        modalBody.appendChild(empty);
        promptModal.classList.add('open');
        return;
      }

      const list = document.createElement('div');
      list.className = 'run-list';

      runs.forEach(function (run, idx) {
        const isLatest = idx === 0;

        const section = document.createElement('div');
        section.className = 'run-section';

        // Header
        const hdr = document.createElement('div');
        hdr.className = 'run-header';

        if (isLatest) {
          const badge = document.createElement('span');
          badge.className = 'run-latest-badge';
          badge.textContent = 'latest';
          hdr.appendChild(badge);
        }

        const taskSpan = document.createElement('span');
        taskSpan.className = 'run-task-id';
        taskSpan.textContent = run.taskId;

        const statusBadge = document.createElement('span');
        statusBadge.className = 'status-label label-' + escHtml(run.status || 'idle');
        statusBadge.textContent = (run.status || 'running').replace(/_/g, ' ');

        const timeSpan = document.createElement('span');
        timeSpan.className = 'run-time';
        timeSpan.textContent = formatTime(run.startedAt);

        hdr.appendChild(taskSpan);
        hdr.appendChild(statusBadge);
        hdr.appendChild(timeSpan);

        // Body
        const body = document.createElement('div');
        body.className = isLatest ? 'run-body' : 'run-body collapsed';

        // User message
        if (run.userMessage) {
          const userBlock = document.createElement('div');
          userBlock.className = 'step-user';
          const lbl = document.createElement('div');
          lbl.className = 'step-label';
          lbl.textContent = 'User message';
          const txt = document.createElement('div');
          txt.textContent = run.userMessage;
          userBlock.appendChild(lbl);
          userBlock.appendChild(txt);
          body.appendChild(userBlock);
        }

        // Steps
        (run.steps || []).forEach(function (step) {
          (step.toolCalls || []).forEach(function (tc) {
            const block = document.createElement('div');
            block.className = 'step-tool-call';
            const lbl = document.createElement('div');
            lbl.className = 'step-label';
            lbl.textContent = 'Tool call: ' + tc.toolName;
            const txt = document.createElement('div');
            txt.textContent = JSON.stringify(tc.args, null, 2);
            block.appendChild(lbl);
            block.appendChild(txt);
            body.appendChild(block);
          });

          (step.toolResults || []).forEach(function (tr) {
            const block = document.createElement('div');
            block.className = 'step-tool-result';
            const lbl = document.createElement('div');
            lbl.className = 'step-label';
            lbl.textContent = 'Result: ' + tr.toolName;
            const txt = document.createElement('div');
            txt.textContent = JSON.stringify(tr.result, null, 2);
            block.appendChild(lbl);
            block.appendChild(txt);
            body.appendChild(block);
          });

          if (step.assistantText) {
            const block = document.createElement('div');
            block.className = 'step-assistant';
            const lbl = document.createElement('div');
            lbl.className = 'step-label';
            lbl.textContent = 'Assistant';
            const txt = document.createElement('div');
            txt.textContent = step.assistantText;
            block.appendChild(lbl);
            block.appendChild(txt);
            body.appendChild(block);
          }
        });

        hdr.addEventListener('click', function () {
          body.classList.toggle('collapsed');
        });

        section.appendChild(hdr);
        section.appendChild(body);
        list.appendChild(section);
      });

      modalBody.appendChild(list);
      promptModal.classList.add('open');
    }

    function closePromptModal() {
      promptModal.classList.remove('open');
    }

    document.getElementById('modal-close').addEventListener('click', closePromptModal);
    promptModal.addEventListener('click', function(e) {
      if (e.target === promptModal) closePromptModal();
    });

    function formatTime(iso) {
      return new Date(iso).toLocaleTimeString('en-GB', { hour12: false });
    }

    function renderAgents(agents) {
      const container = document.getElementById('agents-container');
      container.textContent = ''; // clear safely

      if (!agents.length) {
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.style.height = '80px';
        empty.textContent = 'No agents registered yet';
        container.appendChild(empty);
        return;
      }

      agents.forEach(function(a) {
        const card = document.createElement('div');
        card.className = 'agent-card';

        const header = document.createElement('div');
        header.className = 'agent-header';

        const dot = document.createElement('div');
        dot.className = 'status-dot dot-' + escHtml(a.lastStatus);

        const name = document.createElement('div');
        name.className = 'agent-name';
        name.textContent = a.adapter || a.name;

        header.appendChild(dot);
        header.appendChild(name);

        const meta = document.createElement('div');
        meta.className = 'agent-meta';

        const agentNameSpan = document.createElement('span');
        agentNameSpan.textContent = a.name;

        const statusBadge = document.createElement('span');
        statusBadge.className = 'status-label label-' + escHtml(a.lastStatus);
        statusBadge.textContent = a.lastStatus.replace(/_/g, ' ');

        meta.appendChild(agentNameSpan);
        meta.appendChild(document.createElement('br'));
        meta.appendChild(statusBadge);

        if (a.lastTaskId) {
          const taskSpan = document.createElement('span');
          taskSpan.textContent = 'Task: ' + a.lastTaskId;
          meta.appendChild(taskSpan);
        }

        const timeSpan = document.createElement('span');
        timeSpan.textContent = a.lastRunAt ? formatTime(a.lastRunAt) : 'never run';
        meta.appendChild(timeSpan);

        card.appendChild(header);
        card.appendChild(meta);

        if (a.runs && a.runs.length) {
          const link = document.createElement('span');
          link.className = 'view-history-link';
          link.textContent = 'view history (' + a.runs.length + ')';
          link.addEventListener('click', function () {
            openHistoryModal(a);
          });
          card.appendChild(link);
        }

        container.appendChild(card);
      });
    }

    function renderLogs(events) {
      const feed = document.getElementById('log-feed');
      const countEl = document.getElementById('log-count');

      const newEvents = events.filter(function(e) { return e.id > lastLogId; });
      if (!newEvents.length) return;

      // Remove empty state placeholder if present
      const empty = feed.querySelector('.empty-state');
      if (empty) empty.remove();

      newEvents.forEach(function(e) {
        if (e.id > lastLogId) lastLogId = e.id;

        const row = document.createElement('div');
        row.className = 'log-entry level-' + e.level;

        const timeCell = document.createElement('span');
        timeCell.className = 'log-time';
        timeCell.textContent = formatTime(e.timestamp);

        const sourceCell = document.createElement('span');
        sourceCell.className = 'log-source';
        sourceCell.textContent = '[' + e.source + ']';

        const msgCell = document.createElement('span');
        msgCell.className = 'log-message';

        if (e.taskId) {
          const taskTag = document.createElement('span');
          taskTag.className = 'log-taskid';
          taskTag.textContent = e.taskId;
          msgCell.appendChild(taskTag);
        }

        const msgText = document.createTextNode(e.message);
        msgCell.appendChild(msgText);

        row.appendChild(timeCell);
        row.appendChild(sourceCell);
        row.appendChild(msgCell);
        feed.appendChild(row);
      });

      countEl.textContent = events.length + ' events';

      if (autoScroll) {
        feed.scrollTop = feed.scrollHeight;
      }
    }

    document.getElementById('log-feed').addEventListener('scroll', function() {
      autoScroll = this.scrollTop + this.clientHeight >= this.scrollHeight - 10;
    });

    async function poll() {
      try {
        const [statusRes, logsRes] = await Promise.all([
          fetch('/api/status'),
          fetch('/api/logs'),
        ]);
        renderAgents(await statusRes.json());
        renderLogs(await logsRes.json());
      } catch (err) {
        console.error('Poll error:', err);
      }
    }

    poll();
    setInterval(poll, POLL_INTERVAL);
  </script>
</body>
</html>
